services:
  # CopyParty — file server backend
  # Built from copyparty/ac with extra RAW thumbnail tooling:
  # ffmpeg, exiftool, libraw-tools, imagemagick
  # Set COPYPARTY_EXTERNAL=true in .env to use an existing CopyParty instance
  copyparty:
    build: ./copyparty
    image: eagle-eye-copyparty:latest
    user: "1000:100"
    volumes:
      - ${DATA_DIR:-./data}:/w
      - /export/Eagle-Eye:/raid
      - /mnt/media:/media
    ports:
      - "${COPYPARTY_PORT:-3923}:3923"
    command: -i 0.0.0.0 -p 3923 -v /w:.:rw -v /raid:raid:rw -v /media:media:rw --rproxy -1 --xff-src lan -e2dsa
    restart: unless-stopped
    profiles:
      - bundled-copyparty

  # Companion API — drive mount/eject (optional, Linux-only)
  companion:
    build: ./server
    environment:
      - PORT=3924
      - MEDIA_MOUNT_DIR=${MEDIA_MOUNT_DIR:-/mnt/media}
    ports:
      - "${COMPANION_PORT:-3924}:3924"
    privileged: true
    volumes:
      - /dev:/dev:ro
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      - ${MEDIA_MOUNT_DIR:-/mnt/media}:${MEDIA_MOUNT_DIR:-/mnt/media}:rshared
    profiles:
      - drives
    restart: unless-stopped

  # Frontend — nginx serving React app + reverse proxy
  frontend:
    build: ./client
    ports:
      - "${EAGLE_EYE_PORT:-8080}:80"
    environment:
      - COPYPARTY_URL=${COPYPARTY_URL:-http://copyparty:3923}
      - COMPANION_API_URL=${COMPANION_API_URL:-http://companion:3924}
    restart: unless-stopped
