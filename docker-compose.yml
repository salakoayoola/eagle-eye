services:
  # Companion API — Unified Backend (File System + Drive Management)
  companion:
    build: ./server
    environment:
      - PORT=3924
      - MEDIA_MOUNT_DIR=/media
      - EAGLE_EYE_AUTH_USER=${EAGLE_EYE_AUTH_USER}
      - EAGLE_EYE_AUTH_PASSWORD=${EAGLE_EYE_AUTH_PASSWORD}
      - EAGLE_EYE_SESSION_SECRET=${EAGLE_EYE_SESSION_SECRET}
      - EAGLE_EYE_SESSION_TTL_HOURS=${EAGLE_EYE_SESSION_TTL_HOURS:-12}
      - EAGLE_EYE_SECURE_COOKIE=${EAGLE_EYE_SECURE_COOKIE:-false}
      - EAGLE_EYE_ALLOWED_ORIGINS=${EAGLE_EYE_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    ports:
      - "${COMPANION_PORT:-3924}:3924"
    privileged: true
    volumes:
      - /dev:/dev:ro
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      - /export/Eagle-Eye:/raid
      - ${MEDIA_MOUNT_DIR:-/mnt/media}:/media:rshared
    restart: unless-stopped

  # Frontend — nginx serving React app + reverse proxy
  frontend:
    build: ./client
    ports:
      - "${EAGLE_EYE_PORT:-8080}:80"
    environment:
      - COPYPARTY_URL=http://companion:3924
      - COMPANION_API_URL=http://companion:3924
    restart: unless-stopped
